<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnowRunner Color Tool</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">

  <script src="./js/constants.js"></script>
  <script src="./js/clipboard.js"></script>
  <script src="./js/color-converter.js"></script>
  <script src="./js/color-descriptor.js"></script>
  <script src="./js/color-harmony.js"></script>
  <script src="./js/color-util.js"></script>
  <script src="./js/truck-names.js"></script>
  <script src="./js/truck-colors.js"></script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@emotion/react@11/dist/emotion-react.umd.min.js"></script>
  <script src="https://unpkg.com/@emotion/styled@11/dist/emotion-styled.umd.min.js"></script>
  <script src="https://unpkg.com/@mui/material@5/umd/material-ui.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const {
    Box, Container, Grid, Stack, Paper,
    Tabs, Tab, AppBar, Toolbar,
    TextField, Slider, Button,
    Select, MenuItem, FormControl, InputLabel,
    Alert, Menu,
    Typography,
    CssBaseline, ThemeProvider, createTheme,
  } = MaterialUI;

  const theme = createTheme();

  function hsbToCss(hue, saturation, brightness) {
    const [r, g, b] = ColorConverter.hsbToRgb(hue, saturation, brightness);
    return `rgb(${r}, ${g}, ${b})`;
  }

  function HSBSwatchValues({hsb}) {
    return (
      <>
        <div>H: {Math.round(hsb.hue)}°</div>
        <div>S: {Math.round(hsb.saturation)}%</div>
        <div>B: {Math.round(hsb.brightness)}%</div>
      </>
    );
  }

  function ColorSwatch({ hsb, onClick }) {
    const css = hsbToCss(hsb.hue, hsb.saturation, hsb.brightness);
    return (
      <Box
        onClick={onClick}
        sx={{ display: 'flex', flexDirection: 'column', alignItems: 'center', cursor: onClick ? 'pointer' : 'default' }}
      >
        <Box
          title={ColorDescriptor.describe(hsb.hue, hsb.saturation, hsb.brightness)}
          sx={{
            width: 64, height: 64, borderRadius: 1, mb: 0.5,
            backgroundColor: css,
            transition: 'transform 0.2s, box-shadow 0.2s',
            ...(onClick && { '&:hover': { transform: 'scale(1.08)', boxShadow: 3 } }),
          }}
        />
        <Typography variant="caption" color="text.secondary" component="div" textAlign="center">
          <HSBSwatchValues hsb={ hsb } />
        </Typography>
      </Box>
    );
  }

  function HarmoniesBox({label, colors, onSwatchClick}) {
    return (<Box key={label}>
      <Typography variant="subtitle1" fontWeight={600} gutterBottom>{label}</Typography>
      <Box sx={{display: 'flex', gap: 2, flexWrap: 'wrap'}}>
        {colors.map((hsb, i) => (
          <ColorSwatch key={i} hsb={hsb} onClick={onSwatchClick ? () => onSwatchClick(hsb) : null}/>
        ))}
      </Box>
    </Box>);
  }

  function HarmoniesPanel({ hue, saturation, brightness, onSwatchClick }) {
    const harmonies = React.useMemo(() => [
      { label: 'Analogous',           colors: ColorHarmony.analogous(hue, saturation, brightness) },
      { label: 'Triadic',             colors: ColorHarmony.triadic(hue, saturation, brightness) },
      { label: 'Complementary',       colors: ColorHarmony.complementary(hue, saturation, brightness) },
      { label: 'Split Complementary', colors: ColorHarmony.splitComplementary(hue, saturation, brightness) },
      { label: 'Square',              colors: ColorHarmony.square(hue, saturation, brightness) },
    ], [hue, saturation, brightness]);

    return (
      <Stack spacing={3}>
        {harmonies.map(({ label, colors }) => <HarmoniesBox
          key={ label }
          label={ label }
          colors={ colors }
          onSwatchClick={ onSwatchClick }
          />)}
      </Stack>
    );
  }

  function ColorControlBox({label, controlKey, min, max, color, onChange}) {
    return (<Box key={controlKey}>
      <Typography variant="body2" color="text.secondary">{label}</Typography>
      <Box sx={{display: 'flex', alignItems: 'center', gap: 1}}>
        <Slider
          min={min} max={max} value={color[controlKey]} size="small"
          onChange={(_, val) => onChange({...color, [controlKey]: val})}
          sx={{flex: 1}}
        />
        <TextField
          type="number"
          value={color[controlKey]}
          onChange={e => onChange({...color, [controlKey]: Math.min(max, Math.max(min, Number(e.target.value)))})}
          inputProps={{min, max}}
          size="small"
          sx={{width: 72}}
        />
      </Box>
    </Box>);
  }

  function ColorSliders({ label, color, onChange, isActive, onActivate, onContextMenu }) {
    const css = hsbToCss(color.hue, color.saturation, color.brightness);
    const [r, g, b] = ColorConverter.hsbToRgb(color.hue, color.saturation, color.brightness);
    const controls = [
      { label: 'Hue',        key: 'hue',        min: 0, max: 360 },
      { label: 'Saturation', key: 'saturation', min: 0, max: 100 },
      { label: 'Brightness', key: 'brightness', min: 0, max: 100 },
    ];
    return (
      <Stack spacing={2}>
        <Typography variant="h6">{label}</Typography>
        <Box
          sx={{
            height: 96, borderRadius: 1, backgroundColor: css, cursor: 'pointer',
            boxShadow: isActive ? '0 0 0 3px #1976d2' : 'none',
            transition: 'box-shadow 0.15s',
          }}
          onClick={onActivate}
          onContextMenu={onContextMenu}
        />
        <Typography variant="caption" color="text.secondary">
          {ColorDescriptor.describe(color.hue, color.saturation, color.brightness)}
        </Typography>
        <Typography variant="caption" color="text.secondary">
          {ColorConverter.snowRunnerFormat(r, g, b)}
        </Typography>
        {controls.map(({ label, key, min, max }) => (<ColorControlBox
          key={ key }
          controlKey={ key }
          label={ label }
          min={ min }
          max={ max }
          color={ color }
          onChange={ onChange }
          />)
        )}
      </Stack>
    );
  }

  function ColorSlidersGrid({colors, labels, onChange, activeColor, setActiveColor, setContextMenu}) {
    return (<Grid container spacing={3}>
      {colors.map((color, idx) => (
        <Grid item xs={12} md={4} key={idx}>
          <ColorSliders
            label={labels[idx]}
            color={color}
            onChange={updated => {
              const next = [...colors];
              next[idx] = updated;
              onChange(next);
            }}
            isActive={activeColor === idx}
            onActivate={() => setActiveColor(idx)}
            onContextMenu={e => {
              e.preventDefault();
              setContextMenu({x: e.clientX, y: e.clientY, colorIdx: idx});
            }}
          />
        </Grid>
      ))}
    </Grid>);
  }

  function ColorEditor({ colors, onChange, addToast }) {
    const [activeColor, setActiveColor] = React.useState(0);
    const [contextMenu, setContextMenu] = React.useState(null);

    const labels = ['Primary Color', 'Secondary Color', 'Tertiary Color'];

    const handleCopy = async () => {
      const c = colors[contextMenu.colorIdx];
      setContextMenu(null);
      await HsbClipboard.copy(c);
      addToast(Constants.hsbCopied, 'success');
    };

    const handlePaste = async () => {
      const idx = contextMenu.colorIdx;
      setContextMenu(null);
      try {
        const hsb = await HsbClipboard.paste();
        const updated = [...colors];
        updated[idx] = { hue: hsb.hue, saturation: hsb.saturation, brightness: hsb.brightness };
        onChange(updated);
        addToast(Constants.hsbPasted, 'success');
      } catch (err) {
        addToast(`${Constants.hsbPastedError}: ${err.message}`, 'error');
      }
    };

    return (
      <Box>
        <Paper sx={{p: 3, mb: 2}}>
          <ColorSlidersGrid
            colors={ colors }
          labels={ labels }
          onChange={ onChange }
          activeColor={ activeColor }
          setActiveColor={ setActiveColor }
          setContextMenu={ setContextMenu }
          />

          <Box sx={{display: 'flex', justifyContent: 'center', mt: 3}}>
            <Box sx={{
              width: 100,
              height: 100,
              borderRadius: 1,
              overflow: 'hidden',
              display: 'flex',
              flexDirection: 'column'
            }}>
              {colors.map((c, i) => (
                <Box key={i} sx={{flex: 1, backgroundColor: hsbToCss(c.hue, c.saturation, c.brightness)}}/>
              ))}
            </Box>
          </Box>

          <Box sx={{mt: 2}}>
            <Button
              variant="contained"
              onClick={() => {
                setActiveColor(0);
                onChange([
                  {hue: 180, saturation: 50, brightness: 50},
                  {hue: 180, saturation: 50, brightness: 50},
                  {hue: 180, saturation: 50, brightness: 50},
                ]);
              }}
            >
              Reset Colors
            </Button>
          </Box>
        </Paper>

        <Paper sx={{p: 3}}>
          <Box sx={{display: 'flex', alignItems: 'baseline', gap: 1, mb: 2}}>
            <Typography variant="h6">Color Harmonies</Typography>
            <Typography variant="body2" color="text.secondary">({labels[activeColor]})</Typography>
          </Box>
          <HarmoniesPanel
            hue={colors[activeColor].hue}
            saturation={colors[activeColor].saturation}
            brightness={colors[activeColor].brightness}
            onSwatchClick={async hsb => {
              await HsbClipboard.copy(hsb);
              addToast(Constants.hsbCopied, 'success');
            }}
          />
        </Paper>

        <Menu
          open={Boolean(contextMenu)}
          onClose={() => setContextMenu(null)}
          anchorReference="anchorPosition"
          anchorPosition={contextMenu ? {top: contextMenu.y, left: contextMenu.x} : undefined}
        >
          <MenuItem onClick={handleCopy}>Copy HSB Values</MenuItem>
          <MenuItem onClick={handlePaste}>Paste HSB Values</MenuItem>
        </Menu>
      </Box>
    );
  }

  function ColorCard({ scheme, onLoad }) {
    const colorValues = Object.values(scheme.colors);
    return (
      <Box
        onClick={() => onLoad(scheme)}
        sx={{
          borderRadius: 1, overflow: 'hidden', cursor: 'pointer',
          height: 96, display: 'flex', flexDirection: 'column',
          transition: 'transform 0.2s, box-shadow 0.2s',
          '&:hover': { transform: 'scale(1.05)', boxShadow: 4 },
        }}
      >
        {colorValues.map((color, i) => (
          <Box key={i} sx={{ flex: 1, backgroundColor: color.hex }} />
        ))}
      </Box>
    );
  }

  function ColorExplorer({ onLoadColors }) {
    const [filter, setFilter] = React.useState('');
    const [selectedTruck, setSelectedTruck] = React.useState('');

    const filteredTrucks = React.useMemo(() =>
        truckNames.filter(n => n.toLowerCase().includes(filter.toLowerCase())),
      [filter]
    );

    const colorSchemes = React.useMemo(() => {
      if (!selectedTruck) return [];
      if (selectedTruck === 'ALL') {
        const seen = new Map();
        truckColors.forEach(s => {
          const key = Object.values(s.colors).map(c => c.hex).sort().join('|');
          if (!seen.has(key)) seen.set(key, s);
        });
        return categorizeColorSchemes(Array.from(seen.values()), true);
      }
      const schemes = truckColors.filter(s => s.trucks.includes(selectedTruck) || s.trucks.includes('All'));
      return categorizeColorSchemes(schemes, true);
    }, [selectedTruck]);

    return (
      <Box>
        <Paper sx={{ p: 3, mb: 3, maxWidth: 600, mx: 'auto' }}>
          <Stack spacing={2}>
            <TextField
              label="Filter Trucks"
              placeholder="Truck name or part of name..."
              value={filter}
              onChange={e => setFilter(e.target.value)}
              size="small"
              fullWidth
            />
            <FormControl fullWidth size="small">
              <InputLabel>Select Truck</InputLabel>
                <Select
                  value={selectedTruck}
                  label="Select Truck"
                  onChange={e => setSelectedTruck(e.target.value)}
                >
                  <MenuItem value=""><em>Select a truck</em></MenuItem>
                  <MenuItem value="ALL">All Colors</MenuItem>
                  {filteredTrucks.map(name => (
                    <MenuItem key={name} value={name}>{name}</MenuItem>
                  ))}
                </Select>
            </FormControl>
          </Stack>
        </Paper>

        <Box sx={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(80px, 1fr))', gap: 2 }}>
          {colorSchemes.map((scheme, idx) => (
            <ColorCard key={idx} scheme={scheme} onLoad={onLoadColors} />
          ))}
        </Box>
      </Box>
    );
  }

  function ColorConverterTab({ addToast }) {
    const [hex, setHex] = React.useState('');
    const [result, setResult] = React.useState(null);
    const [error, setError] = React.useState('');

    const handleChange = e => {
      const val = e.target.value;
      setHex(val);
      if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
        try {
          setResult(ColorConverter.hexToHsb(val));
          setError('');
        } catch (err) {
          setResult(null);
          setError(err.message);
        }
      } else {
        setResult(null);
        setError(val.length > 1 ? 'Enter a valid 6-digit hex code' : '');
      }
    };

    const handleCopy = async () => {
      if (!result) return;

      try {
        await HsbClipboard.copy(result);
        addToast(Constants.hsbCopied, 'success');
      } catch {
        addToast(Constants.hsbCopiedError, 'error');
      }
    };

    return (
      <Paper sx={{ p: 4, maxWidth: 480, mx: 'auto' }}>
        <Typography variant="h6" textAlign="center" gutterBottom>CSS Hex to SnowRunner HSB</Typography>
        <Stack spacing={3}>
          <TextField
            label="CSS Hex Code"
            placeholder="#000000"
            value={hex}
            onChange={handleChange}
            error={Boolean(error)}
            helperText={error || ' '}
            fullWidth
          />
          <Box sx={{ p: 2, bgcolor: 'grey.100', borderRadius: 1, fontFamily: 'monospace', fontSize: 14 }}>
            {result
              ? `Hue: ${result.hue}, Saturation: ${result.saturation}, Brightness: ${result.brightness}`
              : 'Hue: N/A, Saturation: N/A, Brightness: N/A'}
          </Box>
          <Box sx={{ textAlign: 'center' }}>
            <Button variant="contained" onClick={handleCopy} disabled={!result}>
              Copy HSB
            </Button>
          </Box>
        </Stack>
      </Paper>
    );
  }

  function App() {
    const [tab, setTab] = React.useState(0);
    const [editorColors, setEditorColors] = React.useState([
      { hue: 180, saturation: 50, brightness: 50 },
      { hue: 180, saturation: 50, brightness: 50 },
      { hue: 180, saturation: 50, brightness: 50 },
    ]);
    const [toasts, setToasts] = React.useState([]);

    const addToast = (message, severity = 'info') => {
      const id = Date.now() + Math.random();
      setToasts(prev => [...prev, { id, message, severity }]);
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
    };

    const handleLoadColors = scheme => {
      const colorValues = Object.values(scheme.colors).slice(0, 3);
      setEditorColors(colorValues.map(c => ({ ...c.hsb })));
      setTab(1);
    };

    const COLOR_EXPLORER_TAB = 0;
    const COLOR_EDITOR_TAB = 1;
    const COLOR_CONVERTER_TAB = 2;

    return (
      <ThemeProvider theme={theme}>
        <CssBaseline />
        <AppBar position="static" elevation={1}>
          <Toolbar>
            <Typography variant="h6">SnowRunner Color Tool</Typography>
          </Toolbar>
        </AppBar>
        <Container maxWidth="xl" sx={{ py: 3 }}>
          <Box sx={{ borderBottom: 1, borderColor: 'divider', mb: 3 }}>
            <Tabs value={tab} onChange={(_, v) => setTab(v)}>
              <Tab label="Color Explorer" />
              <Tab label="Color Editor" />
              <Tab label="Color Converter" />
            </Tabs>
          </Box>
          {tab === COLOR_EXPLORER_TAB && <ColorExplorer onLoadColors={handleLoadColors} />}
          {tab === COLOR_EDITOR_TAB && <ColorEditor colors={editorColors} onChange={setEditorColors} addToast={addToast} />}
          {tab === COLOR_CONVERTER_TAB && <ColorConverterTab addToast={addToast} />}
        </Container>
        <Box sx={{ position: 'fixed', top: 70, right: 16, zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 1 }}>
          {toasts.map(t => (
            <Alert key={t.id} severity={t.severity} variant="filled" sx={{ boxShadow: 3 }}>
              {t.message}
            </Alert>
          ))}
        </Box>
      </ThemeProvider>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
